<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malibu Package Explorer</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f6f2; --surface: #f9f8f5; --surface2: #edeae5;
  --border: #d4d1ca; --text: #28251d; --muted: #7a7974;
  --primary: #01696f; --primary-h: #0c4e54;
  --radius: 0.5rem; --shadow: 0 2px 8px rgba(0,0,0,0.08);
  --font: 'Satoshi', sans-serif;
}
[data-theme="dark"] {
  --bg: #171614; --surface: #1c1b19; --surface2: #2d2c2a;
  --border: #393836; --text: #cdccca; --muted: #797876;
  --primary: #4f98a3; --primary-h: #227f8b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between;
}
.logo { display: flex; align-items: center; gap: 0.75rem; }
.logo svg { color: var(--primary); }
.logo h1 { font-size: 1.25rem; font-weight: 700; }
.logo span { font-size: 0.75rem; color: var(--muted); background: var(--surface2); padding: 0.2rem 0.5rem; border-radius: 99px; }

.toggle { background: none; border: 1px solid var(--border); border-radius: var(--radius); padding: 0.4rem 0.6rem; cursor: pointer; color: var(--text); }

main { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }

.url-bar {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 0.75rem 1rem; display: flex; gap: 0.75rem; align-items: center; margin-bottom: 1.5rem;
  box-shadow: var(--shadow);
}
.url-bar input {
  flex: 1; border: none; background: none; font-family: monospace; font-size: 0.85rem;
  color: var(--text); outline: none;
}
.url-bar button {
  background: var(--primary); color: white; border: none; border-radius: var(--radius);
  padding: 0.5rem 1.25rem; font-weight: 600; cursor: pointer; font-size: 0.875rem;
  transition: background 0.18s;
}
.url-bar button:hover { background: var(--primary-h); }

.filters {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 1rem 1.25rem; margin-bottom: 1.5rem; box-shadow: var(--shadow);
}
.filters h2 { font-size: 0.875rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; }
.filter-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.75rem; }
.filter-group label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--muted); margin-bottom: 0.3rem; }
.filter-group input, .filter-group select {
  width: 100%; padding: 0.45rem 0.65rem; border: 1px solid var(--border);
  border-radius: var(--radius); background: var(--bg); color: var(--text);
  font-size: 0.875rem; font-family: var(--font); outline: none;
  transition: border-color 0.18s;
}
.filter-group input:focus, .filter-group select:focus { border-color: var(--primary); }
.filter-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
.btn-primary { background: var(--primary); color: white; border: none; border-radius: var(--radius); padding: 0.5rem 1.25rem; font-weight: 600; cursor: pointer; font-size: 0.875rem; transition: background 0.18s; }
.btn-primary:hover { background: var(--primary-h); }
.btn-ghost { background: none; color: var(--muted); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.5rem 1rem; cursor: pointer; font-size: 0.875rem; transition: all 0.18s; }
.btn-ghost:hover { border-color: var(--primary); color: var(--primary); }

.stats { font-size: 0.8rem; color: var(--muted); margin-bottom: 1rem; }
.stats b { color: var(--text); }

.package-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1rem; }

.pkg-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 1.1rem 1.25rem; box-shadow: var(--shadow); transition: box-shadow 0.18s;
}
.pkg-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
.pkg-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem; }
.pkg-name { font-weight: 700; font-size: 1rem; color: var(--text); }
.pkg-version { background: var(--surface2); color: var(--muted); font-size: 0.75rem; padding: 0.15rem 0.5rem; border-radius: 99px; font-family: monospace; }
.pkg-desc { font-size: 0.875rem; color: var(--muted); margin-bottom: 0.75rem; line-height: 1.5; }
.pkg-meta { display: flex; flex-direction: column; gap: 0.25rem; font-size: 0.75rem; color: var(--muted); border-top: 1px solid var(--border); padding-top: 0.65rem; margin-top: 0.25rem; }
.pkg-meta-row { display: flex; gap: 0.4rem; }
.pkg-meta-row b { color: var(--text); min-width: 70px; }
.pkg-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.5rem; }
.tag { background: var(--surface2); color: var(--muted); font-size: 0.7rem; padding: 0.15rem 0.45rem; border-radius: 99px; cursor: pointer; transition: all 0.18s; }
.tag:hover { background: var(--primary); color: white; }

.empty { text-align: center; padding: 4rem 2rem; color: var(--muted); }
.empty svg { margin: 0 auto 1rem; opacity: 0.3; }
.empty p { font-size: 0.9rem; }

.loading { text-align: center; padding: 3rem; color: var(--muted); font-size: 0.9rem; }

#status { font-size: 0.75rem; color: var(--muted); margin-left: 0.5rem; }
#status.error { color: #a12c7b; }
#status.ok { color: var(--primary); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-label="Malibu logo">
      <rect x="2" y="2" width="11" height="11" rx="2" fill="currentColor" opacity="0.9"/>
      <rect x="15" y="2" width="11" height="11" rx="2" fill="currentColor" opacity="0.5"/>
      <rect x="2" y="15" width="11" height="11" rx="2" fill="currentColor" opacity="0.5"/>
      <rect x="15" y="15" width="11" height="11" rx="2" fill="currentColor" opacity="0.2"/>
    </svg>
    <h1>Malibu</h1>
    <span>Package Explorer</span>
  </div>
  <button class="toggle" data-theme-toggle aria-label="Toggle dark mode">🌙</button>
</header>

<main>
  <div class="url-bar">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--muted);flex-shrink:0"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
    <input type="text" id="indexUrl" value="https://raw.githubusercontent.com/carles9000/malibu/refs/heads/main/packages/index.json" />
    <span id="status"></span>
    <button onclick="loadIndex()">Cargar índice</button>
  </div>

  <div class="filters">
    <h2>Filtros</h2>
    <div class="filter-grid">
      <div class="filter-group">
        <label>Buscar (nombre / descripción)</label>
        <input type="text" id="fSearch" placeholder="ej: mysql" oninput="applyFilters()">
      </div>
      <div class="filter-group">
        <label>Autor</label>
        <select id="fAuthor" onchange="applyFilters()">
          <option value="">Todos</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Keyword</label>
        <select id="fKeyword" onchange="applyFilters()">
          <option value="">Todas</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Licencia</label>
        <select id="fLicense" onchange="applyFilters()">
          <option value="">Todas</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Fecha desde</label>
        <input type="date" id="fDateFrom" oninput="applyFilters()">
      </div>
      <div class="filter-group">
        <label>Solo última versión</label>
        <select id="fLatest" onchange="applyFilters()">
          <option value="">Todas las versiones</option>
          <option value="yes">Solo última versión</option>
        </select>
      </div>
    </div>
    <div class="filter-actions">
      <button class="btn-primary" onclick="applyFilters()">Aplicar</button>
      <button class="btn-ghost" onclick="clearFilters()">Limpiar filtros</button>
    </div>
  </div>

  <div id="stats" class="stats"></div>
  <div id="results" class="loading">Carga el índice para empezar →</div>
</main>

<script>
let allPackages = [];

(function(){
  const t = document.querySelector('[data-theme-toggle]');
  const r = document.documentElement;
  let d = matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
  r.setAttribute('data-theme', d);
  t && t.addEventListener('click', () => {
    d = d === 'dark' ? 'light' : 'dark';
    r.setAttribute('data-theme', d);
    t.textContent = d === 'dark' ? '☀️' : '🌙';
  });
})();

async function loadIndex() {
  const url = document.getElementById('indexUrl').value.trim();
  const status = document.getElementById('status');
  const results = document.getElementById('results');
  status.textContent = 'Cargando...';
  status.className = '';
  results.innerHTML = '<div class="loading">Conectando...</div>';

  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    allPackages = await r.json();
    status.textContent = `✓ ${allPackages.length} paquetes cargados`;
    status.className = 'ok';
    populateSelects();
    applyFilters();
  } catch(e) {
    status.textContent = '✗ Error: ' + e.message;
    status.className = 'error';
    results.innerHTML = '<div class="empty"><p>No se pudo cargar el índice. Verifica la URL.</p></div>';
  }
}

function populateSelects() {
  const authors = [...new Set(allPackages.map(p => p.author).filter(Boolean))].sort();
  const keywords = [...new Set(allPackages.flatMap(p => p.keywords || []))].sort();
  const licenses = [...new Set(allPackages.map(p => p.license).filter(Boolean))].sort();

  fillSelect('fAuthor', authors);
  fillSelect('fKeyword', keywords);
  fillSelect('fLicense', licenses);
}

function fillSelect(id, options) {
  const sel = document.getElementById(id);
  const current = sel.value;
  sel.innerHTML = '<option value="">Todos</option>';
  options.forEach(o => {
    const opt = document.createElement('option');
    opt.value = o; opt.textContent = o;
    if (o === current) opt.selected = true;
    sel.appendChild(opt);
  });
}

function applyFilters() {
  if (!allPackages.length) return;

  const search  = document.getElementById('fSearch').value.toLowerCase();
  const author  = document.getElementById('fAuthor').value;
  const keyword = document.getElementById('fKeyword').value;
  const license = document.getElementById('fLicense').value;
  const dateFrom= document.getElementById('fDateFrom').value;
  const latest  = document.getElementById('fLatest').value;

  let result = allPackages.filter(p => {
    if (search  && !p.name.toLowerCase().includes(search) && !p.description.toLowerCase().includes(search)) return false;
    if (author  && p.author !== author) return false;
    if (keyword && !(p.keywords || []).includes(keyword)) return false;
    if (license && p.license !== license) return false;
    if (dateFrom && p.date < dateFrom) return false;
    return true;
  });

  if (latest === 'yes') {
    const map = {};
    result.forEach(p => {
      if (!map[p.name] || p.version > map[p.name].version) map[p.name] = p;
    });
    result = Object.values(map);
  }

  result.sort((a,b) => b.date.localeCompare(a.date));

  document.getElementById('stats').innerHTML =
    `Mostrando <b>${result.length}</b> de <b>${allPackages.length}</b> paquetes`;

  renderPackages(result);
}

function renderPackages(packages) {
  const el = document.getElementById('results');
  if (!packages.length) {
    el.innerHTML = `<div class="empty">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
      <p>No hay paquetes que coincidan con los filtros.</p>
    </div>`;
    return;
  }

  el.innerHTML = `<div class="package-grid">${packages.map(pkgCard).join('')}</div>`;
}

function pkgCard(p) {
  const tags = (p.keywords || []).map(k =>
    `<span class="tag" onclick="filterByKeyword('${k}')">${k}</span>`
  ).join('');
  const size = p.size_bytes > 0 ? (p.size_bytes / 1024).toFixed(1) + ' KB' : '—';
  return `<div class="pkg-card">
    <div class="pkg-header">
      <span class="pkg-name">${p.name}</span>
      <span class="pkg-version">v${p.version}</span>
    </div>
    <p class="pkg-desc">${p.description || '—'}</p>
    <div class="pkg-meta">
      <div class="pkg-meta-row"><b>Autor</b> ${p.author || '—'}</div>
      <div class="pkg-meta-row"><b>Fecha</b> ${p.date || '—'}</div>
      <div class="pkg-meta-row"><b>Licencia</b> ${p.license || '—'}</div>
      <div class="pkg-meta-row"><b>Harbour</b> >= ${p.harbour_min || '—'}</div>
      <div class="pkg-meta-row"><b>Tamaño</b> ${size}</div>
    </div>
    ${tags ? `<div class="pkg-tags">${tags}</div>` : ''}
  </div>`;
}

function filterByKeyword(k) {
  document.getElementById('fKeyword').value = k;
  applyFilters();
}

function clearFilters() {
  ['fSearch','fDateFrom'].forEach(id => document.getElementById(id).value = '');
  ['fAuthor','fKeyword','fLicense','fLatest'].forEach(id => document.getElementById(id).value = '');
  applyFilters();
}

// Auto-load on start
loadIndex();
</script>
</body>
</html>
