name: Solicitud de retirada de versión (yanked)
about: Reportar una versión con bug crítico que debe ser retirada del índice
title: "[YANK] nombre-paquete vX.Y.Z"
labels: yank-request
body:
  - type: input
    id: package
    attributes:
      label: Paquete y versión afectada
      placeholder: "hbcurl 1.0.0"
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Motivo
      description: Describe el bug crítico o problema grave
    validations:
      required: true

  - type: dropdown
    id: fix
    attributes:
      label: ¿Hay versión corregida disponible?
      options:
        - "Sí, ya publicada"
        - "En desarrollo"
        - "No"
    validations:
      required: true

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmación
      options:
        - label: Soy el autor original de este paquete
          required: true
